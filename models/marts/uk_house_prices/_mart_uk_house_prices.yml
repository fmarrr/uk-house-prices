version: 2

models:

  # ---------------------------------------------------------------------------
  # mart_transactions — one row per property sale
  # ---------------------------------------------------------------------------
  - name: mart_transactions
    description: >
      All residential property sales in England and Wales from the Land Registry PPD,
      enriched with derived flags and price bands from int_price_paid__enriched.
      One row per transaction.
    columns:
      - name: transaction_id
        description: Unique identifier for each property sale.
        data_tests:
          - unique
          - not_null

      - name: sale_date
        description: Date the sale completed.
        data_tests:
          - not_null

      - name: sale_year
        description: Year of sale.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1995"
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= 2030"

      - name: sale_month
        description: Month of sale (1–12).
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1 and 12"

      - name: sale_price_gbp
        description: Sale price in GBP as stated on the transfer deed.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: price_band
        description: Sale price bucketed into five bands.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'Under £100k'
                  - '£100k–£250k'
                  - '£250k–£500k'
                  - '£500k–£1m'
                  - 'Over £1m'

      - name: property_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Detached', 'Semi-Detached', 'Terraced', 'Flat/Maisonette', 'Other']

      - name: build_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['New Build', 'Established']

      - name: tenure
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Freehold', 'Leasehold']

      - name: ppd_category
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Standard', 'Additional']

      - name: is_london
        description: True if county = 'GREATER LONDON'.
        data_tests:
          - not_null

      - name: is_new_build
        description: True if build_status = 'New Build'.
        data_tests:
          - not_null

      - name: is_leasehold
        description: True if tenure = 'Leasehold'.
        data_tests:
          - not_null

      - name: region
        description: ONS region. Defaults to 'Unknown' until postcode lookup is loaded.
        data_tests:
          - not_null

    data_tests:
      # Price band must be consistent with the actual sale price
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_under_100k_correct
          arguments:
            expression: "sale_price_gbp < 100000"
          config:
            where: "price_band = 'Under £100k'"
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_100k_250k_correct
          arguments:
            expression: "sale_price_gbp >= 100000 and sale_price_gbp < 250000"
          config:
            where: "price_band = '£100k–£250k'"
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_250k_500k_correct
          arguments:
            expression: "sale_price_gbp >= 250000 and sale_price_gbp < 500000"
          config:
            where: "price_band = '£250k–£500k'"
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_500k_1m_correct
          arguments:
            expression: "sale_price_gbp >= 500000 and sale_price_gbp < 1000000"
          config:
            where: "price_band = '£500k–£1m'"
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_over_1m_correct
          arguments:
            expression: "sale_price_gbp >= 1000000"
          config:
            where: "price_band = 'Over £1m'"
      # Flags must be consistent with their source columns
      - dbt_utils.expression_is_true:
          name: mart_transactions_is_london_matches_county
          arguments:
            expression: "is_london = (county = 'GREATER LONDON')"
      - dbt_utils.expression_is_true:
          name: mart_transactions_is_new_build_matches_build_status
          arguments:
            expression: "is_new_build = (build_status = 'New Build')"
      - dbt_utils.expression_is_true:
          name: mart_transactions_is_leasehold_matches_tenure
          arguments:
            expression: "is_leasehold = (tenure = 'Leasehold')"


  # ---------------------------------------------------------------------------
  # mart_price_trends — YoY price trends at street level
  # Grain: sale_year + street + postcode_sector + county
  # ---------------------------------------------------------------------------
  - name: mart_price_trends
    description: >
      Year-on-year price change at street level, built on mart_street_yearly_prices.
      postcode_sector + street identifies the location where postcode is known;
      county + town_city + street is used as fallback where postcode is missing.
      YoY is calculated on the forward-filled price so gap years show flat change.
    columns:
      - name: sale_year
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1995"

      - name: street
        data_tests:
          - not_null

      - name: county
        data_tests:
          - not_null

      - name: avg_sale_price_gbp_filled
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sale_year
              - street
              - postcode_sector
              - county
      # YoY swings beyond ±100% in a single year would be anomalous
      - dbt_utils.expression_is_true:
          name: mart_price_trends_yoy_change_not_extreme
          arguments:
            expression: "yoy_avg_price_change_pct between -100 and 500"
          config:
            where: "yoy_avg_price_change_pct is not null"


  # ---------------------------------------------------------------------------
  # mart_street_yearly_prices — yearly sale price per street with gap fill
  # Grain: sale_year + street + postcode_sector + county
  # ---------------------------------------------------------------------------
  - name: mart_street_yearly_prices
    description: >
      Yearly average sale price per street, identified by street name and postcode
      sector (e.g. 'SW1A 1'). Gap years with no sales are forward-filled using
      the most recent known average. transaction_count = 0 and raw price columns
      are null for filled gap rows. Filter by postcode_sector to look up streets
      in an area.
    columns:
      - name: sale_year
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1995"

      - name: street
        data_tests:
          - not_null

      - name: postcode_sector
        description: First characters of postcode excluding last 2 (e.g. 'SW1A 1').
        data_tests:
          - not_null

      - name: transaction_count
        description: Number of sales in the year. 0 for forward-filled gap years.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: avg_sale_price_gbp_filled
        description: Average sale price; carried forward from prior year when transaction_count = 0.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: median_sale_price_gbp_filled
        description: Median sale price; carried forward from prior year when transaction_count = 0.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

    data_tests:
      # Compound unique key
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sale_year
              - street
              - postcode_sector
      # Filled price must equal actual price when a sale occurred
      - dbt_utils.expression_is_true:
          name: mart_street_yearly_prices_filled_matches_actual
          arguments:
            expression: "avg_sale_price_gbp_filled = round(avg_sale_price_gbp, 10)"
          config:
            where: "transaction_count > 0"
      # Gap rows must have null raw prices and zero transaction count
      - dbt_utils.expression_is_true:
          name: mart_street_yearly_prices_gap_rows_have_null_prices
          arguments:
            expression: "avg_sale_price_gbp is null and transaction_count = 0"
          config:
            where: "transaction_count = 0"


  # ---------------------------------------------------------------------------
  # mart_newbuild_premium — annual new build vs established price premium
  # Grain: sale_year + street + postcode_sector + county + town_city + property_type
  # ---------------------------------------------------------------------------
  - name: mart_newbuild_premium
    description: >
      Annual new build price premium over established properties at street level.
      postcode_sector is null where postcode is missing; county + town_city + street
      identifies the location in that case. Only rows where both new build and
      established sales exist are included. Reports absolute (£) and percentage premium.
    columns:
      - name: sale_year
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1995"

      - name: street
        data_tests:
          - not_null

      - name: county
        data_tests:
          - not_null

      - name: property_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Detached', 'Semi-Detached', 'Terraced', 'Flat/Maisonette', 'Other']

      - name: new_build_avg_price_gbp
        description: Average sale price for new builds in the partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: established_avg_price_gbp
        description: Average sale price for established properties in the partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: new_build_median_price_gbp
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: established_median_price_gbp
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: new_build_count
        description: Number of new build sales in the partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: established_count
        description: Number of established property sales in the partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: avg_premium_gbp
        description: Difference between new build and established average prices (£).
        data_tests:
          - not_null

      - name: avg_premium_pct
        description: Premium as a percentage of the established average price.
        data_tests:
          - not_null
          # A premium beyond 300% or a discount beyond 80% would be anomalous
          - dbt_utils.expression_is_true:
              name: mart_newbuild_premium_avg_premium_pct_in_range
              arguments:
                expression: "between -80 and 300"

      - name: median_premium_gbp
        description: Difference between new build and established median prices (£).
        data_tests:
          - not_null

    data_tests:
      # Compound unique key
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sale_year
              - street
              - postcode_sector
              - county
              - property_type
      # avg_premium_gbp must equal rounded difference of avg prices (within £1 rounding)
      - dbt_utils.expression_is_true:
          name: mart_newbuild_premium_avg_premium_gbp_correct
          arguments:
            expression: >
              abs(avg_premium_gbp - round(new_build_avg_price_gbp - established_avg_price_gbp, 0)) <= 1
      # median_premium_gbp must equal rounded difference of median prices (within £1 rounding)
      - dbt_utils.expression_is_true:
          name: mart_newbuild_premium_median_premium_gbp_correct
          arguments:
            expression: >
              abs(median_premium_gbp - round(new_build_median_price_gbp - established_median_price_gbp, 0)) <= 1
      # avg_premium_pct must be consistent with the underlying prices
      - dbt_utils.expression_is_true:
          name: mart_newbuild_premium_pct_consistent_with_prices
          arguments:
            expression: >
              abs(
                avg_premium_pct
                - round((new_build_avg_price_gbp - established_avg_price_gbp)
                        / nullif(established_avg_price_gbp, 0) * 100, 2)
              ) <= 0.01