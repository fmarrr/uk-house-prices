version: 2

models:

  # ---------------------------------------------------------------------------
  # mart_transactions — one row per property sale
  # ---------------------------------------------------------------------------
  - name: mart_transactions
    description: >
      All residential property sales in England and Wales from the Land Registry PPD,
      enriched with derived flags and price bands from int_price_paid__enriched.
      One row per transaction.
    columns:
      - name: transaction_id
        description: Unique identifier for each property sale.
        data_tests:
          - unique
          - not_null

      - name: sale_date
        description: Date the sale completed.
        data_tests:
          - not_null

      - name: sale_year
        description: Year of sale.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1995"
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= 2030"

      - name: sale_month
        description: Month of sale (1–12).
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1 and 12"

      - name: sale_price_gbp
        description: Sale price in GBP as stated on the transfer deed.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: price_band
        description: Sale price bucketed into five bands.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'Under £100k'
                  - '£100k–£250k'
                  - '£250k–£500k'
                  - '£500k–£1m'
                  - 'Over £1m'

      - name: property_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Detached', 'Semi-Detached', 'Terraced', 'Flat/Maisonette', 'Other']

      - name: build_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['New Build', 'Established']

      - name: tenure
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Freehold', 'Leasehold']

      - name: ppd_category
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Standard', 'Additional']

      - name: is_london
        description: True if county = 'GREATER LONDON'.
        data_tests:
          - not_null

      - name: is_new_build
        description: True if build_status = 'New Build'.
        data_tests:
          - not_null

      - name: is_leasehold
        description: True if tenure = 'Leasehold'.
        data_tests:
          - not_null

      - name: region
        description: ONS region. Defaults to 'Unknown' until postcode lookup is loaded.
        data_tests:
          - not_null

    data_tests:
      # Price band must be consistent with the actual sale price
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_under_100k_correct
          arguments:
            expression: "sale_price_gbp < 100000"
          config:
            where: "price_band = 'Under £100k'"
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_100k_250k_correct
          arguments:
            expression: "sale_price_gbp >= 100000 and sale_price_gbp < 250000"
          config:
            where: "price_band = '£100k–£250k'"
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_250k_500k_correct
          arguments:
            expression: "sale_price_gbp >= 250000 and sale_price_gbp < 500000"
          config:
            where: "price_band = '£250k–£500k'"
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_500k_1m_correct
          arguments:
            expression: "sale_price_gbp >= 500000 and sale_price_gbp < 1000000"
          config:
            where: "price_band = '£500k–£1m'"
      - dbt_utils.expression_is_true:
          name: mart_transactions_price_band_over_1m_correct
          arguments:
            expression: "sale_price_gbp >= 1000000"
          config:
            where: "price_band = 'Over £1m'"
      # Flags must be consistent with their source columns
      - dbt_utils.expression_is_true:
          name: mart_transactions_is_london_matches_county
          arguments:
            expression: "is_london = (county = 'GREATER LONDON')"
      - dbt_utils.expression_is_true:
          name: mart_transactions_is_new_build_matches_build_status
          arguments:
            expression: "is_new_build = (build_status = 'New Build')"
      - dbt_utils.expression_is_true:
          name: mart_transactions_is_leasehold_matches_tenure
          arguments:
            expression: "is_leasehold = (tenure = 'Leasehold')"


  # ---------------------------------------------------------------------------
  # mart_price_trends — annual price trends with YoY and rolling average
  # Grain: sale_year + region + property_type + tenure
  # ---------------------------------------------------------------------------
  - name: mart_price_trends
    description: >
      Annual average and median prices by region, property type, and tenure with
      year-on-year percentage change and a 3-year rolling average. Built from
      int_price_paid__monthly so no raw aggregations happen here.
    columns:
      - name: sale_year
        description: Year of aggregation.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1995"

      - name: region
        description: ONS region.
        data_tests:
          - not_null

      - name: property_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Detached', 'Semi-Detached', 'Terraced', 'Flat/Maisonette', 'Other']

      - name: tenure
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Freehold', 'Leasehold']

      - name: annual_transaction_count
        description: Total number of sales in the year for this partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: avg_sale_price_gbp
        description: Average sale price across all months in the year.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: avg_median_sale_price_gbp
        description: Average of monthly medians (weighted median approximation).
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              config:
                where: "avg_median_sale_price_gbp is not null"

      - name: yoy_avg_price_change_pct
        description: >
          Year-on-year % change in average sale price within the partition.
          Null for the first year of each partition.
        data_tests:
          # YoY swings beyond ±80% in a single year would be data anomalies
          - dbt_utils.expression_is_true:
              name: mart_price_trends_yoy_change_not_extreme
              arguments:
                expression: "between -80 and 200"
              config:
                where: "yoy_avg_price_change_pct is not null"

      - name: rolling_3yr_avg_price_gbp
        description: 3-year rolling average of avg_sale_price_gbp.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              config:
                where: "rolling_3yr_avg_price_gbp is not null"

    data_tests:
      # Compound unique key
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sale_year
              - region
              - property_type
              - tenure
      # Rolling 3yr average should be within 50% of the annual average
      - dbt_utils.expression_is_true:
          name: mart_price_trends_rolling_avg_near_annual_avg
          arguments:
            expression: >
              rolling_3yr_avg_price_gbp between avg_sale_price_gbp * 0.5
                                            and avg_sale_price_gbp * 1.5
          config:
            where: "rolling_3yr_avg_price_gbp is not null"


  # ---------------------------------------------------------------------------
  # mart_market_activity — monthly volume with rolling metrics (incremental)
  # Grain: month_start_date + region + property_type
  # ---------------------------------------------------------------------------
  - name: mart_market_activity
    description: >
      Monthly market activity per region and property type. Incremental model —
      new months are appended without full refresh. Includes rolling 12-month
      volume and 3-month rolling average price.
    columns:
      - name: month_start_date
        description: First day of the month. Used as the time-series key.
        data_tests:
          - not_null

      - name: sale_year
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1995"

      - name: sale_month
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1 and 12"

      - name: region
        data_tests:
          - not_null

      - name: property_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Detached', 'Semi-Detached', 'Terraced', 'Flat/Maisonette', 'Other']

      - name: transaction_count
        description: Number of sales in this month/region/property_type.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: avg_sale_price_gbp
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: new_build_count
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: established_count
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: rolling_12m_transaction_count
        description: Sum of transactions over the trailing 12 months.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              name: mart_market_activity_rolling_12m_gte_monthly
              arguments:
                expression: ">= transaction_count"

      - name: rolling_3m_avg_price_gbp
        description: 3-month rolling average price (smooths seasonal noise).
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              config:
                where: "rolling_3m_avg_price_gbp is not null"

      - name: mom_volume_change_pct
        description: Month-on-month % change in transaction count. Null for first month.
        data_tests:
          - dbt_utils.expression_is_true:
              name: mart_market_activity_mom_change_not_extreme
              arguments:
                expression: "between -100 and 500"
              config:
                where: "mom_volume_change_pct is not null"

    data_tests:
      # Compound unique key
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - month_start_date
              - region
              - property_type
      # new_build + established must sum to the total
      - dbt_utils.expression_is_true:
          name: mart_market_activity_build_status_counts_sum_to_total
          arguments:
            expression: "new_build_count + established_count = transaction_count"
      # month_start_date must be the first of the month
      - dbt_utils.expression_is_true:
          name: mart_market_activity_month_start_is_first_of_month
          arguments:
            expression: "day(month_start_date) = 1"
      # month_start_date must be consistent with sale_year and sale_month
      - dbt_utils.expression_is_true:
          name: mart_market_activity_date_year_month_consistent
          arguments:
            expression: >
              year(month_start_date) = sale_year
              and month(month_start_date) = sale_month


  # ---------------------------------------------------------------------------
  # mart_newbuild_premium — annual new build vs established price premium
  # Grain: sale_year + region + county + property_type
  # ---------------------------------------------------------------------------
  - name: mart_newbuild_premium
    description: >
      Annual new build price premium over established properties by region, county,
      and property type. Only rows where both new build and established sales exist
      are included. Reports absolute (£) and percentage premium.
    columns:
      - name: sale_year
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1995"

      - name: region
        data_tests:
          - not_null

      - name: county
        data_tests:
          - not_null

      - name: property_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Detached', 'Semi-Detached', 'Terraced', 'Flat/Maisonette', 'Other']

      - name: new_build_avg_price_gbp
        description: Average sale price for new builds in the partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: established_avg_price_gbp
        description: Average sale price for established properties in the partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: new_build_median_price_gbp
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: established_median_price_gbp
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: new_build_count
        description: Number of new build sales in the partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: established_count
        description: Number of established property sales in the partition.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: avg_premium_gbp
        description: Difference between new build and established average prices (£).
        data_tests:
          - not_null

      - name: avg_premium_pct
        description: Premium as a percentage of the established average price.
        data_tests:
          - not_null
          # A premium beyond 300% or a discount beyond 80% would be anomalous
          - dbt_utils.expression_is_true:
              name: mart_newbuild_premium_avg_premium_pct_in_range
              arguments:
                expression: "between -80 and 300"

      - name: median_premium_gbp
        description: Difference between new build and established median prices (£).
        data_tests:
          - not_null

    data_tests:
      # Compound unique key
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sale_year
              - region
              - county
              - property_type
      # avg_premium_gbp must equal rounded difference of avg prices (within £1 rounding)
      - dbt_utils.expression_is_true:
          name: mart_newbuild_premium_avg_premium_gbp_correct
          arguments:
            expression: >
              abs(avg_premium_gbp - round(new_build_avg_price_gbp - established_avg_price_gbp, 0)) <= 1
      # median_premium_gbp must equal rounded difference of median prices (within £1 rounding)
      - dbt_utils.expression_is_true:
          name: mart_newbuild_premium_median_premium_gbp_correct
          arguments:
            expression: >
              abs(median_premium_gbp - round(new_build_median_price_gbp - established_median_price_gbp, 0)) <= 1
      # avg_premium_pct must be consistent with the underlying prices
      - dbt_utils.expression_is_true:
          name: mart_newbuild_premium_pct_consistent_with_prices
          arguments:
            expression: >
              abs(
                avg_premium_pct
                - round((new_build_avg_price_gbp - established_avg_price_gbp)
                        / nullif(established_avg_price_gbp, 0) * 100, 2)
              ) <= 0.01