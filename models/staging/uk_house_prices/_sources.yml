version: 2

sources:
  - name: uk_house_prices
    description: UK Land Registry Price Paid Data (PPD)
    database: HOUSE_PRICES
    schema: raw
    tables:
      - name: price_paid
        description: >
          Residential property sales in England and Wales submitted to HM Land Registry
          for registration. Covers sales since January 1995.
        columns:
          - name: transaction_id
            description: Reference number generated automatically recording each published sale. The same as a Unique Transaction Identifier (UTI).
          - name: price
            description: Sale price stated on the transfer deed.
          - name: date_of_transfer
            description: Date when the sale was completed, as stated on the transfer deed.
          - name: postcode
            description: Postcode of the property.
          - name: property_type
            description: "D=Detached, S=Semi-Detached, T=Terraced, F=Flats/Maisonettes, O=Other."
          - name: old_or_new
            description: "Y=newly built, N=established residential building."
          - name: duration
            description: "F=Freehold, L=Leasehold."
          - name: paon
            description: Primary Addressable Object Name (house number or name).
          - name: saon
            description: Secondary Addressable Object Name (flat/apartment number).
          - name: street
          - name: locality
          - name: town_city
          - name: district
          - name: county
          - name: ppd_category
            description: "A=Standard Price Paid, B=Additional Price Paid (e.g. buy-to-let)."
          - name: record_status
            description: "A=Addition, C=Change, D=Delete."
